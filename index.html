    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Custom Hook for Window Size
        function useWindowSize() {
            const [size, setSize] = useState([0, 0]);
            useEffect(() => {
                function updateSize() {
                    setSize([window.innerWidth, window.innerHeight]);
                }
                window.addEventListener('resize', updateSize);
                updateSize();
                return () => window.removeEventListener('resize', updateSize);
            }, []);
            return size;
        }

        // --- COMPONENTS ---

        // 1. Three.js Background Component
        const ThreeBackground = () => {
            const mountRef = useRef(null);

            useEffect(() => {
                if (!mountRef.current) return;

                // Setup
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // optimize
                mountRef.current.appendChild(renderer.domElement);

                // Materials
                const materialPrimary = new THREE.MeshBasicMaterial({ 
                    color: 0x00ff88, 
                    wireframe: true, 
                    transparent: true, 
                    opacity: 0.3 
                });
                const materialAccent = new THREE.MeshBasicMaterial({ 
                    color: 0xffd700, 
                    wireframe: true, 
                    transparent: true, 
                    opacity: 0.2 
                });
                const materialSecondary = new THREE.MeshBasicMaterial({ 
                    color: 0xff6b35, 
                    wireframe: true, 
                    transparent: true, 
                    opacity: 0.25 
                });

                // Geometries
                const icosahedron = new THREE.Mesh(new THREE.IcosahedronGeometry(2, 0), materialPrimary);
                const octahedron = new THREE.Mesh(new THREE.OctahedronGeometry(1.5, 0), materialAccent);
                const tetrahedron = new THREE.Mesh(new THREE.TetrahedronGeometry(1.8, 0), materialSecondary);

                // Positioning
                icosahedron.position.set(-3, 1, -5);
                octahedron.position.set(4, -2, -6);
                tetrahedron.position.set(2, 3, -4);

                // Add to scene
                const objects = new THREE.Group();
                objects.add(icosahedron);
                objects.add(octahedron);
                objects.add(tetrahedron);
                scene.add(objects);

                camera.position.z = 5;

                // Mouse interaction for subtle camera movement
                let mouseX = 0;
                let mouseY = 0;
                let targetX = 0;
                let targetY = 0;

                const windowHalfX = window.innerWidth / 2;
                const windowHalfY = window.innerHeight / 2;

                const onDocumentMouseMove = (event) => {
                    mouseX = (event.clientX - windowHalfX) * 0.001;
                    mouseY = (event.clientY - windowHalfY) * 0.001;
                };

                document.addEventListener('mousemove', onDocumentMouseMove);

                // Animation Loop
                let animationFrameId;
                const animate = () => {
                    targetX = mouseX * 2;
                    targetY = mouseY * 2;

                    // Smooth camera follow
                    camera.position.x += (targetX - camera.position.x) * 0.02;
                    camera.position.y += (-targetY - camera.position.y) * 0.02;
                    camera.lookAt(scene.position);

                    // Rotate objects
                    icosahedron.rotation.x += 0.002;
                    icosahedron.rotation.y += 0.003;
                    
                    octahedron.rotation.x -= 0.003;
                    octahedron.rotation.y -= 0.002;
                    
                    tetrahedron.rotation.x += 0.004;
                    tetrahedron.rotation.z += 0.002;

                    // Float objects group
                    objects.position.y = Math.sin(Date.now() * 0.001) * 0.5;

                    renderer.render(scene, camera);
                    animationFrameId = requestAnimationFrame(animate);
                };

                animate();

                // Handle Resize
                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);

                // Cleanup
                return () => {
                    cancelAnimationFrame(animationFrameId);
                    window.removeEventListener('resize', handleResize);
                    document.removeEventListener('mousemove', onDocumentMouseMove);
                    if (mountRef.current) {
                        mountRef.current.removeChild(renderer.domElement);
                    }
                    // Dispose geometries and materials
                    icosahedron.geometry.dispose();
                    octahedron.geometry.dispose();
                    tetrahedron.geometry.dispose();
                    materialPrimary.dispose();
                    materialAccent.dispose();
                    materialSecondary.dispose();
                    renderer.dispose();
                };
            }, []);

            return (
                <div 
                    ref={mountRef} 
                    className="fixed inset-0 z-[-1] pointer-events-none opacity-50"
                />
            );
        };

        // 2. Particle Effect System
        const ParticleEffects = () => {
            useEffect(() => {
                const colors = ['#00ff88', '#ffd700', '#ff6b35', '#00d4ff'];
                
                const createParticle = (x, y) => {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    
                    // Random properties
                    const size = Math.random() * 8 + 4;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                    particle.style.background = color;
                    particle.style.boxShadow = `0 0 ${size*2}px ${color}`;
                    particle.style.left = `${x}px`;
                    particle.style.top = `${y}px`;
                    
                    document.body.appendChild(particle);
                    
                    // Physics
                    const angle = Math.random() * Math.PI * 2;
                    const velocity = Math.random() * 5 + 2;
                    let vx = Math.cos(angle) * velocity;
                    let vy = Math.sin(angle) * velocity;
                    let opacity = 1;
                    let scale = 1;
                    
                    const animateParticle = () => {
                        // Gravity & Drag
                        vy += 0.1; // gravity
                        vx *= 0.99; // drag
                        
                        // Update position
                        const currentX = parseFloat(particle.style.left);
                        const currentY = parseFloat(particle.style.top);
                        
                        particle.style.left = `${currentX + vx}px`;
                        particle.style.top = `${currentY + vy}px`;
                        
                        // Fade and scale
                        opacity -= 0.02;
                        scale -= 0.01;
                        
                        particle.style.opacity = opacity;
                        particle.style.transform = `translate(-50%, -50%) scale(${scale})`;
                        
                        if (opacity > 0) {
                            requestAnimationFrame(animateParticle);
                        } else {
                            particle.remove();
                        }
                    };
                    
                    requestAnimationFrame(animateParticle);
                };

                const handleClick = (e) => {
                    // Spawn 10-15 particles on click
                    const particleCount = Math.floor(Math.random() * 6) + 10;
                    for (let i = 0; i < particleCount; i++) {
                        createParticle(e.clientX, e.clientY);
                    }
                };

                window.addEventListener('click', handleClick);
                return () => window.removeEventListener('click', handleClick);
            }, []);

            return null; // Logic-only component
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [activeSection, setActiveSection] = useState('home');

            // Initialize Lucide Icons after render
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            // Re-run icons on active section change just in case
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [activeSection]);

            // Scroll Spy
            useEffect(() => {
                const observerOptions = {
                    root: null,
                    rootMargin: '-20% 0px -60% 0px',
                    threshold: 0
                };

                const observerCallback = (entries) => {
                    entries.forEach((entry) => {
                        if (entry.isIntersecting) {
                            setActiveSection(entry.target.id);
                        }
                    });
                };

                const observer = new IntersectionObserver(observerCallback, observerOptions);
                const sections = document.querySelectorAll('section[id]');
                
                sections.forEach((section) => observer.observe(section));

                return () => sections.forEach((section) => observer.unobserve(section));
            }, []);

            return (
                <div className="relative bg-grid min-h-screen selection:bg-primary/30 selection:text-primary">
                    <ThreeBackground />
                    <ParticleEffects />
                    
                    <Navbar activeSection={activeSection} />

                        <About />
                        <Projects />
                        <Skills />
                        <Contact />
                    </main>

                    <Footer />
                </div>
            );
        };

        const rootNode = document.getElementById('root');
        const root = ReactDOM.createRoot(rootNode);
        root.render(<App />);
